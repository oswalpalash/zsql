name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zsql
          POSTGRES_PASSWORD: zsql
          POSTGRES_DB: zsql
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zsql -d zsql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Format check
        run: zig fmt --check .

      - name: Build
        run: zig build

      - name: Test (default)
        run: zig build test

      - name: CLI doctor
        run: zig build run -- doctor

      - name: Offline checked-queries example
        run: zig build checked-queries-example

      - name: Install system SQLite
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev pkg-config
          pkg-config --modversion sqlite3
          pkg-config --libs --cflags sqlite3

      - name: Test with SQLite
        run: zig build test -Denable-sqlite=true

      - name: SQLite example
        run: zig build sqlite-example -Denable-sqlite=true

      - name: SQLite migration example
        run: zig build sqlite-migrate-example -Denable-sqlite=true

      - name: Live PostgreSQL integration tests
        env:
          ZSQL_PG_URL: postgres://zsql:zsql@127.0.0.1:5432/zsql?sslmode=disable
        run: zig build test-postgres
